name: Daily Deals Scraper

on:
  schedule:
    # 01:00 UTC = 4:00 AM Saudi Time (Runs EVERY DAY)
    - cron: '0 1 * * *'
  workflow_dispatch:

# --- Gives the robot permission to save files to your repository ---
permissions:
  contents: write

jobs:
  scrape-deals:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python Libraries
        run: pip install httpx google-genai beautifulsoup4 playwright supabase

      - name: Install Playwright Web Browser
        run: playwright install chromium --with-deps

      # ---> Food scraper runs FIRST! <---
      - name: Run Cobone Food Scraper
        run: python cobone_scraper.py

      # ---> Grocery scraper runs SECOND! <---
      - name: Run D4D Grocery Scraper
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
        run: python d4d_scraper.py

      # --- Saves files safely back to your GitHub folder only if they exist ---
      - name: Save Website Files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Only add files if they were successfully created during this run
          if [ -f d4d_results.html ]; then git add d4d_results.html d4d_results.json; fi
          if [ -f cobone_results.html ]; then git add cobone_results.html cobone_results.json; fi
          
          git commit -m "🤖 Auto-updated grocery and food deals" || exit 0
          git push
