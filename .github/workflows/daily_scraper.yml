name: Daily D4D Scraper

on:
  schedule:
    # Runs at 04:00 UTC (7:00 AM Saudi Time) exactly on Monday (Day 1)
    - cron: '0 4 * * 1'
    # Runs at 11:00 UTC (2:00 PM Saudi Time) exactly on Thursday (Day 4)
    - cron: '0 11 * * 4'
  workflow_dispatch: # Keeps the manual run button active

# --- NEW: Gives the robot permission to save files to your repository ---
permissions:
  contents: write

jobs:
  scrape-deals:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python Libraries
        run: pip install -r requirements.txt

      - name: Install Playwright Web Browser
        run: playwright install chromium --with-deps

      - name: Run the Scraper!
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
        run: python d4d_scraper.py

      # --- NEW: Saves the generated HTML file back to your GitHub folder ---
      - name: Save Website Files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add d4d_results.html d4d_results.json
          git commit -m "🤖 Auto-updated weekly deals" || exit 0
          git push
