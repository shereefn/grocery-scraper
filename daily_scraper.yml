name: Daily D4D Scraper

# This tells the robot to run at midnight (UTC time) every single day
on:
  schedule:
    - cron: '0 0 * * *'
  # This line lets you click a button to run it manually whenever you want!
  workflow_dispatch: 

jobs:
  scrape-deals:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python Libraries
        run: pip install -r requirements.txt

      - name: Install Playwright Web Browser
        run: playwright install chromium --with-deps

      - name: Run the Scraper!
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python d4d_scraper.py